name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: Setup scripts smoke test
        run: |
          node scripts/setup.mjs --defaults --dry-run
          npm run check:setup
      - run: npm run build
        env:
          # Build in "no backend" mode — no secrets needed for CI.
          NEXT_TELEMETRY_DISABLED: "1"
